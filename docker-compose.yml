version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_trading_framework
      POSTGRES_USER: framework
      POSTGRES_PASSWORD: framework
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    depends_on:
      - postgres
    environment:
      APP_ENV: local
      PUBLIC_BASE_URL: http://127.0.0.1:8000
      DATABASE_URL: postgresql+psycopg://framework:framework@postgres:5432/ai_trading_framework
      TELEGRAM_WEBHOOK_SECRET: change-me
      AUTH_MODE: PASSWORD
      ADMIN_EMAIL: ops@example.com
      ADMIN_PASSWORD: change-me
      ADMIN_DISPLAY_NAME: Local Operator
    ports:
      - "8000:8000"

volumes:
  postgres_data:
